<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bgGlass" cx="42%" cy="36%" r="58%">
      <stop offset="0%" stop-color="#E8B4F8" />
      <stop offset="25%" stop-color="#C084FC" />
      <stop offset="55%" stop-color="#8B5CF6" />
      <stop offset="80%" stop-color="#6D28D9" />
      <stop offset="100%" stop-color="#4C1D95" />
    </radialGradient>

    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>

    <clipPath id="bgClip"><circle cx="32" cy="32" r="28" /></clipPath>
  </defs>

  <!-- Soft outer glow -->
  <circle cx="32" cy="32" r="28" fill="#8B5CF6" opacity="0.35" filter="url(#outerGlow)" />

  <!-- Glass background circle -->
  <circle cx="32" cy="32" r="28" fill="url(#bgGlass)" />

  <!-- Glass highlights -->
  <ellipse cx="27" cy="21" rx="17" ry="11" fill="white" opacity="0.22" clip-path="url(#bgClip)" />
  <ellipse cx="25" cy="18" rx="9" ry="5.5" fill="white" opacity="0.38" clip-path="url(#bgClip)" />

  <!-- Subtle rim -->
  <circle cx="32" cy="32" r="27.75" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="0.5" />

  <!-- Venn diagram — stroke only, no fill, thick white lines -->
  <circle cx="25" cy="25" r="12" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9" />
  <circle cx="39" cy="25" r="12" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9" />
  <circle cx="32" cy="37" r="12" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9" />
</svg>
